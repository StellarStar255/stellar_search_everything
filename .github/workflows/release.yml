name: Build and Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install dependencies
        run: pip install -r requirements.txt pyinstaller
      - name: Build .app
        run: pyinstaller --windowed --name "Stellar Search Everything" --icon assets/AppIcon.icns --add-data "assets/icon.png:assets" FileSearchQt.py
      - name: Zip .app
        run: ditto -c -k --keepParent "dist/Stellar Search Everything.app" "StellarSearchEverything-${{ github.ref_name }}-macos-arm64.zip"
      - uses: actions/upload-artifact@v4
        with:
          name: macos
          path: StellarSearchEverything-*.zip

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install dependencies
        run: pip install -r requirements.txt pyinstaller
      - name: Convert icns to ico
        run: python -c "from PIL import Image; Image.open('assets/AppIcon.icns').save('icon.ico', sizes=[(256,256),(128,128),(64,64),(48,48),(32,32),(16,16)])"
      - name: Build exe
        run: pyinstaller --onefile --windowed --name StellarSearchEverything --icon icon.ico --add-data "assets/icon.png;assets" FileSearchQt.py
      - name: Zip exe
        run: Compress-Archive -Path dist/StellarSearchEverything.exe -DestinationPath "StellarSearchEverything-${{ github.ref_name }}-windows-x86_64.zip"
      - uses: actions/upload-artifact@v4
        with:
          name: windows
          path: StellarSearchEverything-*.zip

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y python3-venv libxcb-cursor0 libxkbcommon-x11-0 libxcb-icccm4 libxcb-keysyms1 libxcb-shape0
      - name: Install dependencies
        run: |
          python3 -m venv .venv
          .venv/bin/pip install -r requirements.txt pyinstaller
      - name: Build binary
        run: .venv/bin/pyinstaller --onefile --windowed --name stellar-search-everything --add-data "assets/icon.png:assets" FileSearchQt.py
      - name: Package
        run: tar -czf "StellarSearchEverything-${{ github.ref_name }}-linux-x86_64.tar.gz" -C dist stellar-search-everything
      - uses: actions/upload-artifact@v4
        with:
          name: linux
          path: StellarSearchEverything-*.tar.gz

  release:
    needs: [build-macos, build-windows, build-linux]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true
      - name: Extract release notes from CHANGELOG.md
        run: |
          version="${GITHUB_REF_NAME#v}"
          awk -v ver="$version" '
            /^## / { if (found) exit; if (index($0, "[" ver "]")) found=1; next }
            found { print }
          ' CHANGELOG.md > release_notes.md
          if ! grep -q '[^[:space:]]' release_notes.md; then
            echo "::warning::CHANGELOG.md 中没有找到 [$version] 小节，将使用自动生成的说明"
          fi
      - uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*
          body_path: release_notes.md
          generate_release_notes: true
