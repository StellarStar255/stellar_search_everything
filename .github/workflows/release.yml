name: Build and Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'
      - name: Install dependencies
        run: pip install -r requirements.txt pyinstaller
      - name: Build .app
        run: pyinstaller --windowed --name "Stellar Search Everything" --icon assets/AppIcon.icns --add-data "assets/icon.png:assets" --add-data "assets/check.svg:assets" FileSearchQt.py
      - name: Create DMG
        run: |
          mkdir dmg-staging
          cp -R "dist/Stellar Search Everything.app" dmg-staging/
          ln -s /Applications dmg-staging/Applications
          hdiutil create -volname "Stellar Search Everything" -srcfolder dmg-staging -ov -format UDZO \
            "StellarSearchEverything-${{ github.ref_name }}-macos-arm64.dmg"
      - uses: actions/upload-artifact@v7
        with:
          name: macos
          path: StellarSearchEverything-*.dmg

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'
      - name: Install dependencies
        run: pip install -r requirements.txt pyinstaller
      - name: Convert icns to ico
        run: python -c "from PIL import Image; Image.open('assets/AppIcon.icns').save('icon.ico', sizes=[(256,256),(128,128),(64,64),(48,48),(32,32),(16,16)])"
      - name: Build exe
        run: pyinstaller --onefile --windowed --name StellarSearchEverything --icon icon.ico --add-data "assets/icon.png;assets" --add-data "assets/check.svg;assets" FileSearchQt.py
      - name: Build installer (Inno Setup)
        run: |
          & "${env:ProgramFiles(x86)}\Inno Setup 6\ISCC.exe" `
            /DMyAppVersion=$($env:GITHUB_REF_NAME.TrimStart('v')) `
            /DSourceExe=$PWD\dist\StellarSearchEverything.exe `
            /DSourceIco=$PWD\icon.ico `
            /DOutputBase=StellarSearchEverything-$env:GITHUB_REF_NAME-windows-x86_64-setup `
            /O. packaging\windows\installer.iss
      - uses: actions/upload-artifact@v7
        with:
          name: windows
          path: StellarSearchEverything-*-setup.exe

  build-linux:
    runs-on: ubuntu-latest
    # 在 Ubuntu 22.04 容器里构建：ubuntu-latest 已是 24.04（glibc 2.39），
    # 直接构建的二进制在 22.04（glibc 2.35）上报 GLIBC not found 起不来；
    # 容器里以 2.35 为基线，产物在 22.04 及更新系统上都能运行
    container: ubuntu:22.04
    steps:
      - name: Install system dependencies
        # Qt 运行库必须装全：PyInstaller 的 Qt 钩子要在构建机加载 PySide6
        # 查询插件目录，缺 libglib 等库时会静默跳过插件收集，打出没有
        # xcb 平台插件的残包（运行时报 Could not find "xcb" in ""）
        run: |
          apt-get update
          DEBIAN_FRONTEND=noninteractive apt-get install -y \
            python3 python3-venv python3-pip binutils git \
            libglib2.0-0 libdbus-1-3 libfontconfig1 libfreetype6 \
            libgl1 libegl1 libopengl0 libx11-6 libx11-xcb1 libxext6 libxrender1 \
            libsm6 libice6 libxkbcommon0 libxkbcommon-x11-0 \
            libxcb1 libxcb-cursor0 libxcb-icccm4 libxcb-keysyms1 libxcb-shape0 \
            libxcb-render0 libxcb-render-util0 libxcb-shm0 libxcb-randr0 \
            libxcb-xfixes0 libxcb-sync1 libxcb-xkb1 libxcb-image0 libxcb-util1 \
            libxcb-glx0
      - uses: actions/checkout@v7
      - name: Install dependencies
        run: |
          python3 -m venv .venv
          .venv/bin/pip install -r requirements.txt pyinstaller
      - name: Build binary
        run: .venv/bin/pyinstaller --onefile --windowed --name stellar-search-everything --add-data "assets/icon.png:assets" --add-data "assets/check.svg:assets" FileSearchQt.py
      - name: Verify bundled Qt platform plugin
        # 防止再次打出没有 xcb 插件的残包：缺了直接让构建失败
        run: |
          .venv/bin/python - <<'EOF'
          from PyInstaller.archive.readers import CArchiveReader
          names = list(CArchiveReader("dist/stellar-search-everything").toc.keys())
          hits = [n for n in names if "platforms" in n and "qxcb" in n]
          assert hits, f"包内缺少 xcb 平台插件！归档条目数={len(names)}"
          print("bundled:", hits)
          EOF
      - name: Build .deb
        run: |
          VER="${GITHUB_REF_NAME#v}"
          mkdir -p pkg/DEBIAN pkg/usr/bin pkg/usr/share/applications \
                   pkg/usr/share/icons/hicolor/256x256/apps
          cp dist/stellar-search-everything pkg/usr/bin/
          cp assets/icon.png pkg/usr/share/icons/hicolor/256x256/apps/stellar-search-everything.png
          cat > pkg/usr/share/applications/stellar-search-everything.desktop <<EOF
          [Desktop Entry]
          Type=Application
          Name=Stellar Search Everything
          Comment=Local file search tool
          Exec=stellar-search-everything
          Icon=stellar-search-everything
          Categories=Utility;
          StartupWMClass=stellar-search-everything
          EOF
          cat > pkg/DEBIAN/control <<EOF
          Package: stellar-search-everything
          Version: $VER
          Section: utils
          Priority: optional
          Architecture: amd64
          Maintainer: StellarStar255 <goosehuangmatt@gmail.com>
          Depends: libxcb-cursor0, libxkbcommon-x11-0
          Description: Cross-platform local file search tool
           Fast filename and content search with a dark-themed Qt GUI.
          EOF
          dpkg-deb --build --root-owner-group pkg \
            "StellarSearchEverything-${GITHUB_REF_NAME}-linux-amd64.deb"
      - uses: actions/upload-artifact@v7
        with:
          name: linux
          path: StellarSearchEverything-*.deb

  release:
    needs: [build-macos, build-windows, build-linux]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/download-artifact@v8
        with:
          path: artifacts
          merge-multiple: true
      - name: Extract release notes from CHANGELOG.md
        run: |
          version="${GITHUB_REF_NAME#v}"
          awk -v ver="$version" '
            /^## / { if (found) exit; if (index($0, "[" ver "]")) found=1; next }
            found { print }
          ' CHANGELOG.md > release_notes.md
          if ! grep -q '[^[:space:]]' release_notes.md; then
            echo "::warning::CHANGELOG.md 中没有找到 [$version] 小节，将使用自动生成的说明"
          fi
      - uses: softprops/action-gh-release@v3
        with:
          files: artifacts/*
          body_path: release_notes.md
          generate_release_notes: true
